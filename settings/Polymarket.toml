#===================================================================================================================
#                                    GRID TRADING (Торговля по сетке)
#===================================================================================================================

# URL маркета и outcome для grid trading
# Формат: [URL, OUTCOME] — например ["https://polymarket.com/event/.../market-slug", "Yes"]
POLYMARKET_GRID_URL = ["https://polymarket.com/event/cuban-regime-falls-in-2026", "Yes"]

# Количество ордеров в сетке
# Каждый уровень получит GRID_AMOUNT / GRID_NUM_ORDERS USDC
# Важно: каждый уровень должен быть >= $5 (минимальный ордер Polymarket)
POLYMARKET_GRID_NUM_ORDERS = 5

# Шаг сетки в центах (расстояние между уровнями покупки)
# Level 1 = best_bid, Level 2 = best_bid - bin, Level 3 = best_bid - 2*bin, ...
POLYMARKET_GRID_BIN_CENTS = 2.0

# Минимальная наценка для SELL ордера (центы выше цены покупки)
# При fill BUY на уровне → SELL ставится по buy_price + markup
POLYMARKET_GRID_MARKUP_CENTS = 2.0

# Общая сумма на сетку (в USDC). Делится на NUM_ORDERS уровней
# Формат: [мин, макс] — случайное значение из диапазона
POLYMARKET_GRID_AMOUNT = ["50", "50"]

# Режим фиксированных диапазонов (опционально).
# Когда оба заданы → сетка работает в фиксированных зонах вместо динамики от best_bid.
# BUY_RANGE = [мин_центы, макс_центы] — покупки распределяются по этой зоне
# SELL_RANGE = [мин_центы, макс_центы] — продажи распределяются по этой зоне
# Пример: BUY_RANGE = [80, 90], SELL_RANGE = [90, 95] → покупка 80-90¢, продажа 90-95¢
# Оставить [] для динамического режима (сетка от best_bid − BIN_CENTS, по умолчанию)
POLYMARKET_GRID_BUY_RANGE = []
POLYMARKET_GRID_SELL_RANGE = []

#===================================================================================================================
#                                    LP REWARDS (Фарминг ликвидности)
#===================================================================================================================

# Капитал для LP farming. Строки = проценты от баланса, числа = фикс USDC
# Примеры: ["90", "95"] = 90-95% баланса, [250, 250] = ровно $250
POLYMARKET_LP_TOTAL_AMOUNT = [100, 100]

# Кол-во маркетов для авто-выбора (0 = использовать POLYMARKET_ORDERS_URL вместо авто-выбора)
# Бот сам подберёт оптимальное кол-во уровней и размеры под бюджет
POLYMARKET_LP_AUTO_MARKETS = 2

# Фильтр категорий для авто-выбора (пусто = все). Пример: ["Sports", "Crypto"]
POLYMARKET_LP_CATEGORIES = []

# Мгновенный merge: при fill одной стороны — сразу купить другую и merge → USDC
# Merge бесплатный ($1 за пару), быстрее возвращает капитал в работу
POLYMARKET_LP_INSTANT_MERGE = true

# Время работы. Пусто = работает бесконечно
# Формат: "HH:MM" (до этого времени ET) или "YYYY-MM-DD HH:MM"
POLYMARKET_LP_END_TIME = ""

# URL-mode для LP: если в POLYMARKET_ORDERS_URL (см. секцию выше) задан список
# маркетов — LP фармит ТОЛЬКО их (ротация и автодискавери отключаются).
# Маркеты должны быть на странице rewards.polymarket.com (иметь активные LP
# rewards), иначе они будут пропущены с предупреждением.