#----------------------------------------------------POLYMARKET VOLUME-----------------------------------------------------

# Кол-во циклов покупки продажи через лимитные ордера
POLYMARKET_CIRCLE_COUNT = [5, 10]

# Интервал проверки состояния открытого ордера (актуальная цена в стакане/заполнение)
POLYMARKET_MONITOR_SLEEP = 10

# Надбавка к цене продажи в центах. Пример: Покупка по 0.50$, MIN_PROFIT_CENTS = 5 → продажа по 0.55$
POLYMARKET_MIN_PROFIT_CENTS = 0.1

# Максимальная цена позиции. Покупка: не покупает выше этой цены. Продажа: если sell price >= этой цены — не продаёт (hold до экспирации)
POLYMARKET_MAX_PRICE = 0.998

# Стоп-лосс в центах. Если цена упадет на эту величину от цены покупки - маркет продажа. 0 = отключен
POLYMARKET_STOP_LOSS_CENTS = 20

# Минимальный процент заполнения BUY ордера для считывания выполненным (50 = 50%)
POLYMARKET_BUY_ORDER_FILL_PERCENTAGE = 50

# Порог очереди для реордера. 0.5 = реордер если очередь > 50% от нашего размера
POLYMARKET_REORDER_SIZE_THRESHOLD = 0.5

# Диапазон сумм для размещения ордеров (USDC)
POLYMARKET_ORDER_AMOUNT = ["100", "100"]

# Таймаут на покупку (секунды)
POLYMARKET_BUY_TIMEOUT = 2600000 # 1месяц+

# Таймаут на продажу (секунды)
POLYMARKET_SELL_TIMEOUT = 2600000 # 1месяц+

# Таймаут ожидания подтверждения трейдов на чейне (секунды)
POLYMARKET_TRADE_CONFIRM_TIMEOUT = 600

# Таймаут ожидания Safe транзакции (секунды)
POLYMARKET_TX_WAIT_TIMEOUT = 600

# Таймаут бриджа для deposit/withdraw (секунды)
POLYMARKET_BRIDGE_TIMEOUT = 1200

# Ссылки на маркеты для крутки волюма
# Формат: [URL, ИСХОД] или [URL, ИСХОД, MAX_PRICE]
#   - Без 3-го параметра → используется глобальный POLYMARKET_MAX_PRICE
#   - С 3-м параметром (0.0-1.0) → свой лимит цены для этого события (покупка и продажа)
#   - 0 → отключить проверку максимальной цены для этого события
# Также можно указать в столбце Solana таблицы accounts_data.xlsx
# Формат для Solana столбца: url1;YES@url2;NO
POLYMARKET_ORDERS_URL = [
    ["https://polymarket.com/event/what-price-will-bitcoin-hit-in-march-2026/will-bitcoin-reach-105k-in-march-2026", "NO"],
    ["https://polymarket.com/event/what-price-will-bitcoin-hit-march-9-15/will-bitcoin-reach-84k-march-9-15", "NO"],
]

